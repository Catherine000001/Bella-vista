<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella Vista — Fine Italian Dining</title>
<meta name="description" content="Bella Vista Restaurant — An intimate fine dining experience celebrating the art of Italian cuisine. Reserve your table tonight.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== TOKENS ===== */
  :root {
    --charcoal: #1a1a1a;
    --charcoal-soft: #252525;
    --charcoal-mid: #2e2e2e;
    --ivory: #f5f0e8;
    --ivory-warm: #ede6d6;
    --gold: #c9a96e;
    --gold-light: #dfc49a;
    --gold-dark: #a8884e;
    --sage: #8a9e8a;
    --sage-light: #b5c4b5;
    --rose: #d4a5a5;
    --white: #ffffff;
    --text-muted: #888880;
    --border: rgba(201,169,110,0.2);
    --error-red: #e57373;

    --ff-display: 'Playfair Display', Georgia, serif;
    --ff-sub: 'Cormorant Garant', Georgia, serif;
    --ff-body: 'Inter', system-ui, sans-serif;

    --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --transition-fast: 0.2s ease;
    --transition-smooth: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    --radius: 2px;
    --radius-lg: 8px;
    --shadow-soft: 0 8px 32px rgba(0,0,0,0.08);
    --shadow-md: 0 15px 50px rgba(0,0,0,0.12);
    --shadow-lg: 0 20px 80px rgba(0,0,0,0.15);
    --shadow-gold: 0 8px 30px rgba(201,169,110,0.2);
    --shadow-gold-lg: 0 20px 60px rgba(201,169,110,0.25);
  }

  /* ===== RESET & BASE ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    font-family: var(--ff-body);
    background: var(--charcoal);
    color: var(--ivory);
    overflow-x: hidden;
    line-height: 1.6;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button, input, select, textarea { font-family: inherit; }
  ::selection { background: var(--gold); color: var(--charcoal); }

  /* ===== LOADER ===== */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--charcoal);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; }
  .loader-logo {
    font-family: var(--ff-display);
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--gold);
    letter-spacing: 0.12em;
    animation: fadeInUp 1s ease forwards;
  }
  .loader-bar {
    width: 200px; height: 1px;
    background: var(--charcoal-mid);
    position: relative; overflow: hidden;
  }
  .loader-bar::after {
    content: '';
    position: absolute; top: 0; left: -100%; height: 100%;
    width: 100%; background: var(--gold);
    animation: loadBar 1.8s ease forwards;
  }
  @keyframes loadBar { to { left: 0; } }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== NAV ===== */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 20px 5%;
    display: flex; align-items: center; justify-content: space-between;
    transition: background var(--transition), padding var(--transition), backdrop-filter var(--transition);
  }
  nav.scrolled {
    background: rgba(26,26,26,0.75);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    padding: 14px 5%;
    border-bottom: 1px solid rgba(201,169,110,0.1);
    box-shadow: var(--shadow-soft);
  }
  .nav-logo {
    font-family: var(--ff-display);
    font-size: 1.5rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    font-style: italic;
    transition: transform var(--transition-fast);
  }
  .nav-logo:hover {
    transform: translateY(-2px);
  }
  .nav-links {
    display: flex; gap: 36px; list-style: none; align-items: center;
  }
  .nav-links a {
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ivory);
    transition: color var(--transition-fast), text-shadow var(--transition-fast);
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -4px; left: 0; right: 100%;
    height: 1px; background: var(--gold);
    transition: right var(--transition-fast);
  }
  .nav-links a:hover { 
    color: var(--gold);
    text-shadow: 0 0 8px rgba(201,169,110,0.3);
  }
  .nav-links a:hover::after { right: 0; }
  .nav-reserve {
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--gold) !important;
    padding: 8px 20px;
    border-radius: var(--radius);
    font-size: 0.75rem !important;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all var(--transition-fast) !important;
    position: relative;
    overflow: hidden;
  }
  .nav-reserve::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: var(--gold);
    transition: left var(--transition-fast);
    z-index: -1;
  }
  .nav-reserve:hover {
    background: var(--gold) !important;
    color: var(--charcoal) !important;
    box-shadow: 0 4px 16px rgba(201,169,110,0.3);
  }
  .nav-reserve::after { display: none !important; }
  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 4px;
  }
  .hamburger span {
    display: block; width: 24px; height: 1.5px;
    background: var(--ivory);
    transition: var(--transition);
  }
  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4.5px, 4.5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4.5px, -4.5px); }
  .mobile-menu {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26,26,26,0.97);
    backdrop-filter: blur(30px);
    z-index: 999; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 36px;
    opacity: 0; visibility: hidden;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  .mobile-menu.open { opacity: 1; visibility: visible; display: flex; }
  .mobile-menu a {
    font-family: var(--ff-display);
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--ivory);
    letter-spacing: 0.06em;
    transition: all var(--transition-fast);
  }
  .mobile-menu a:hover { 
    color: var(--gold);
    transform: translateY(-2px);
  }

  /* ===== SECTION HELPERS ===== */
  .section-eyebrow {
    font-family: var(--ff-body);
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex; align-items: center; gap: 12px;
  }
  .section-eyebrow::before, .section-eyebrow::after {
    content: ''; display: block;
    width: 30px; height: 1px; background: var(--gold);
  }
  .section-title {
    font-family: var(--ff-display);
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    line-height: 1.15;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .section-subtitle {
    font-family: var(--ff-sub);
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.8;
  }
  .gold { color: var(--gold); }
  .italic { font-style: italic; }
  .divider {
    width: 60px; height: 1px; background: var(--gold);
    margin: 20px 0;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--gold);
    color: var(--charcoal);
    padding: 16px 36px;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    border: none; border-radius: var(--radius);
    cursor: pointer;
    transition: all var(--transition-smooth);
    box-shadow: var(--shadow-gold);
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }
  .btn-primary:hover {
    background: var(--gold-light);
    transform: translateY(-3px);
    box-shadow: var(--shadow-gold-lg);
  }
  .btn-primary:active {
    transform: translateY(-1px);
  }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 10px;
    background: transparent;
    color: var(--ivory);
    padding: 15px 36px;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    border: 1.5px solid rgba(245,240,232,0.3);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all var(--transition-smooth);
    position: relative;
    overflow: hidden;
  }
  .btn-outline:hover {
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(201,169,110,0.2);
    background: rgba(201,169,110,0.05);
  }
  .btn-outline:active {
    transform: translateY(-1px);
  }

  /* ===== SCROLL REVEAL ===== */
  .reveal {
    opacity: 0;
    transform: translateY(60px);
    transition: opacity 1s var(--transition), transform 1s var(--transition);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-left {
    opacity: 0; transform: translateX(-80px);
    transition: opacity 1s var(--transition), transform 1s var(--transition);
  }
  .reveal-left.visible { opacity: 1; transform: translateX(0); }
  .reveal-right {
    opacity: 0; transform: translateX(80px);
    transition: opacity 1s var(--transition), transform 1s var(--transition);
  }
  .reveal-right.visible { opacity: 1; transform: translateX(0); }
  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }
  .delay-4 { transition-delay: 0.4s; }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg, rgba(26,26,26,0.85) 0%, rgba(26,26,26,0.5) 50%, rgba(26,26,26,0.75) 100%),
      radial-gradient(ellipse at 70% 50%, rgba(201,169,110,0.08) 0%, transparent 60%);
    background-color: #1a1a1a;
    animation: bgShift 20s ease-in-out infinite;
  }
  @keyframes bgShift {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  .hero-art {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 80%, rgba(138,158,138,0.06) 0%, transparent 40%),
      radial-gradient(circle at 80% 20%, rgba(201,169,110,0.08) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(212,165,165,0.04) 0%, transparent 60%);
  }
  .hero-canvas {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(
        120deg,
        transparent,
        transparent 80px,
        rgba(201,169,110,0.015) 80px,
        rgba(201,169,110,0.015) 81px
      ),
      repeating-linear-gradient(
        60deg,
        transparent,
        transparent 120px,
        rgba(245,240,232,0.01) 120px,
        rgba(245,240,232,0.01) 121px
      );
  }
  .hero-content {
    position: relative; z-index: 2;
    text-align: center;
    padding: 0 5%;
    max-width: 900px;
    animation: heroContentFade 1.2s ease-out 0.2s both;
  }
  @keyframes heroContentFade {
    from { 
      opacity: 0; 
      transform: translateY(40px) scale(0.95);
    }
    to { 
      opacity: 1; 
      transform: translateY(0) scale(1);
    }
  }
  .hero-eyebrow {
    font-family: var(--ff-body);
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: inline-flex; align-items: center; gap: 16px;
    animation: fadeInUp 1s ease 0.5s both;
  }
  .hero-eyebrow span { width: 40px; height: 1px; background: var(--gold); display: block; }
  .hero-headline {
    font-family: var(--ff-display);
    font-size: clamp(3rem, 8vw, 7rem);
    line-height: 1.05;
    font-weight: 400;
    margin-bottom: 24px;
    animation: fadeInUp 1s ease 0.7s both;
    letter-spacing: -0.03em;
  }
  .hero-headline em {
    font-style: italic;
    color: var(--gold);
    display: block;
  }
  .hero-desc {
    font-family: var(--ff-sub);
    font-size: clamp(1rem, 2.5vw, 1.35rem);
    color: rgba(245,240,232,0.75);
    font-weight: 300;
    line-height: 1.9;
    max-width: 600px;
    margin: 0 auto 44px;
    animation: fadeInUp 1s ease 0.9s both;
    letter-spacing: 0.3px;
  }
  .hero-buttons {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    animation: fadeInUp 1s ease 1.1s both;
  }
  .hero-scroll {
    position: absolute; bottom: 40px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--text-muted); font-size: 0.65rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    animation: fadeInUp 1s ease 1.4s both;
    z-index: 2;
    cursor: pointer;
    transition: color var(--transition-fast);
  }
  .hero-scroll:hover {
    color: var(--gold);
  }
  .scroll-line {
    width: 1px; height: 50px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollPulse 2s ease infinite;
  }
  @keyframes scrollPulse {
    0%, 100% { opacity: 1; transform: scaleY(1); }
    50% { opacity: 0.4; transform: scaleY(0.8); }
  }
  .hero-orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); pointer-events: none;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .hero-orb-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,169,110,0.06), transparent);
    top: 10%; left: 5%;
    animation-delay: 0s;
  }
  .hero-orb-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(138,158,138,0.05), transparent);
    bottom: 15%; right: 10%;
    animation-delay: 3s;
  }
  .hero-orb-3 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(212,165,165,0.04), transparent);
    top: 40%; right: 5%;
    animation-delay: 5s;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-40px) scale(1.08); }
  }

  /* ===== WAVE DIVIDER ===== */
  .wave-divider {
    position: relative; overflow: hidden;
    height: 80px; background: transparent;
  }
  .wave-divider svg { position: absolute; bottom: 0; width: 100%; }

  /* ===== ABOUT ===== */
  #about {
    background: var(--ivory);
    color: var(--charcoal);
    padding: clamp(100px, 12vw, 160px) 5%;
    position: relative;
  }
  .about-grid {
    max-width: 1200px; margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 100px; align-items: center;
  }
  .about-visual {
    position: relative;
  }
  .about-img-main {
    width: 100%; aspect-ratio: 3/4;
    background: linear-gradient(135deg, #2e2e2e 0%, #1a1a1a 100%);
    border-radius: 12px;
    overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-lg);
    transition: transform var(--transition), box-shadow var(--transition);
  }
  .about-img-main:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-lg);
  }
  .about-img-main svg { width: 60%; opacity: 0.15; }
  .about-img-accent {
    position: absolute;
    bottom: -40px; right: -40px;
    width: 55%; aspect-ratio: 1;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-gold-lg);
    transition: transform var(--transition), box-shadow var(--transition);
  }
  .about-img-accent:hover {
    transform: scale(1.05);
    box-shadow: var(--shadow-gold-lg);
  }
  .about-img-accent-inner {
    text-align: center; color: var(--charcoal); padding: 20px;
  }
  .about-img-accent-inner .num {
    font-family: var(--ff-display);
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 600; line-height: 1;
  }
  .about-img-accent-inner .label {
    font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; font-weight: 600;
    margin-top: 4px;
  }
  .about-text .section-eyebrow { margin-bottom: 20px; }
  .about-text .section-title { margin-bottom: 24px; }
  .about-text .section-subtitle {
    color: #6a6a62; margin-bottom: 28px;
  }
  .about-body {
    font-size: 0.98rem; color: #5a5a52;
    line-height: 1.95; margin-bottom: 36px;
    letter-spacing: 0.3px;
  }
  .chef-card {
    display: flex; align-items: center; gap: 20px;
    padding: 28px; background: rgba(237,230,214,0.6);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    border: 1px solid rgba(201,169,110,0.2);
    margin-top: 36px;
    transition: all var(--transition);
  }
  .chef-card:hover {
    background: rgba(237,230,214,0.8);
    transform: translateY(-4px);
    box-shadow: var(--shadow-soft);
  }
  .chef-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--charcoal), var(--charcoal-mid));
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-family: var(--ff-display);
    font-size: 1.4rem;
  }
  .chef-info .chef-name {
    font-family: var(--ff-display);
    font-size: 1.1rem; color: var(--charcoal);
    font-weight: 500;
  }
  .chef-info .chef-title {
    font-size: 0.75rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--gold);
    margin-top: 2px;
  }
  .chef-info .chef-bio {
    font-size: 0.88rem; color: #6a6a62; margin-top: 8px; line-height: 1.7;
  }
  .about-stats {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 24px; margin-top: 40px;
  }
  .stat {
    text-align: center; padding: 24px;
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 8px;
    transition: all var(--transition);
    cursor: pointer;
  }
  .stat:hover {
    border-color: var(--gold);
    box-shadow: var(--shadow-gold);
    transform: translateY(-4px);
  }
  .stat .n {
    font-family: var(--ff-display);
    font-size: 2.2rem; color: var(--gold);
    font-weight: 600; line-height: 1;
  }
  .stat .l {
    font-size: 0.7rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: #8a8a82;
    margin-top: 8px;
  }

  /* ===== MENU ===== */
  #menu {
    background: var(--charcoal);
    padding: clamp(100px, 12vw, 160px) 5%;
  }
  .menu-header {
    text-align: center; max-width: 700px; margin: 0 auto 80px;
  }
  .menu-header .section-eyebrow { justify-content: center; margin-bottom: 20px; }
  .menu-header .section-title { margin-bottom: 16px; }
  .menu-filters {
    display: flex; gap: 12px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 80px;
  }
  .filter-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    padding: 12px 28px;
    font-size: 0.75rem; letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 100px; cursor: pointer;
    transition: all var(--transition);
  }
  .filter-btn:hover { 
    border-color: var(--gold); 
    color: var(--gold);
    background: rgba(201,169,110,0.05);
  }
  .filter-btn.active {
    background: var(--gold); border-color: var(--gold);
    color: var(--charcoal); font-weight: 600;
    box-shadow: var(--shadow-gold);
  }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 32px; max-width: 1200px; margin: 0 auto;
  }
  .menu-card {
    background: var(--charcoal-soft);
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 12px;
    overflow: hidden;
    transition: all var(--transition-smooth);
    position: relative;
    box-shadow: var(--shadow-soft);
  }
  .menu-card:hover {
    transform: translateY(-12px);
    box-shadow: var(--shadow-lg);
    border-color: var(--gold);
  }
  .menu-card-img {
    width: 100%; aspect-ratio: 16/10;

<script>
// ===== SCROLL REVEAL OBSERVER =====
const observerOptions = {
  threshold: 0.15,
  rootMargin: '0px 0px -60px 0px'
};

const revealElements = document.querySelectorAll('[class*="reveal"]');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, observerOptions);

revealElements.forEach(el => observer.observe(el));

// ===== NAV SCROLL EFFECT =====
const nav = document.querySelector('nav');
let lastScrollTop = 0;

window.addEventListener('scroll', () => {
  let scrollTop = window.pageYOffset;
  if (scrollTop > 100) {
    nav.classList.add('scrolled');
  } else {
    nav.classList.remove('scrolled');
  }
  lastScrollTop = scrollTop;
});

// ===== SMOOTH SCROLL TO SECTION =====
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function (e) {
    e.preventDefault();
    const target = document.querySelector(this.getAttribute('href'));
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
});

// ===== REMOVE LOADER =====
window.addEventListener('load', () => {
  const loader = document.getElementById('loader');
  if (loader) {
    setTimeout(() => loader.classList.add('hidden'), 800);
  }
});
</script>
</body>
</html>
